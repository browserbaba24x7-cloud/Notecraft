<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoteCraft - Nested Notes</title>

  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#e8a84c">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="application-name" content="Notecraft">
  <meta name="apple-mobile-web-app-title" content="Notecraft">
  <meta name="description"
    content="A beautiful, fast note-taking app. Organize your thoughts with folders, colors, and rich text editing.">

  <!-- Favicons -->
  <link rel="icon" type="image/svg+xml" href="./favicon/favicon.svg">
  <link rel="icon" type="image/png" sizes="96x96" href="./favicon/favicon-96x96.png">
  <link rel="icon" href="./favicon/favicon.ico">
  <link rel="shortcut icon" href="./favicon/favicon.ico">

  <!-- Apple -->
  <link rel="apple-touch-icon" sizes="180x180" href="./favicon/apple-touch-icon.png">

  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --bg-deep: #0d0d14;
      --bg-sidebar: #12121c;
      --bg-main: #161623;
      --bg-card: #1c1c2e;
      --bg-hover: #22223a;
      --bg-active: #2a2a48;
      --fg: #e8e8f0;
      --fg-dim: #8888a8;
      --fg-muted: #55556e;
      --accent: #ff6b35;
      --accent-hover: #ff8255;
      --accent-glow: rgba(255, 107, 53, 0.15);
      --border: #1e1e32;
      --border-light: #2a2a44;
      --folder-color: #ff9f6b;
      --note-dot: #ff6b35;
      --success: #4ade80;
      --danger: #f87171;
      --toolbar-bg: #1a1a2c;
      --scrollbar-thumb: #2a2a44;
      --scrollbar-track: transparent;
      --sidebar-w: 300px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-deep);
      color: var(--fg);
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    ::-webkit-scrollbar {
      width: 5px;
    }

    ::-webkit-scrollbar-track {
      background: var(--scrollbar-track);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--scrollbar-thumb);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--fg-muted);
    }

    .sidebar-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(3px);
      z-index: 90;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .sidebar-backdrop.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: var(--sidebar-w);
      height: 100vh;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 100;
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 4px 0 24px rgba(0, 0, 0, 0.3);
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent), #ff9f6b);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #fff;
      font-weight: 700;
    }

    .logo-text {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--fg);
      letter-spacing: -0.5px;
    }

    .sidebar-actions {
      display: flex;
      gap: 4px;
    }

    .sidebar-actions button {
      background: transparent;
      border: none;
      color: var(--fg-dim);
      width: 30px;
      height: 30px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sidebar-actions button:hover {
      background: var(--bg-hover);
      color: var(--fg);
    }

    .search-bar {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
    }

    .search-input-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      transition: border-color 0.2s;
    }

    .search-input-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .search-input-wrap i {
      color: var(--fg-muted);
      font-size: 13px;
    }

    .search-input-wrap input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--fg);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      width: 100%;
    }

    .search-input-wrap input::placeholder {
      color: var(--fg-muted);
    }

    .folder-tree {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .tree-section-label {
      padding: 12px 20px 6px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--fg-muted);
      user-select: none;
    }

    .all-notes-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 20px;
      margin: 2px 8px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--fg-dim);
    }

    .all-notes-item:hover {
      background: var(--bg-hover);
      color: var(--fg);
    }

    .all-notes-item.active {
      background: var(--accent-glow);
      color: var(--accent);
    }

    .all-notes-item i {
      font-size: 14px;
      width: 18px;
      text-align: center;
    }

    .all-notes-item .count-badge {
      margin-left: auto;
      font-size: 11px;
      background: var(--bg-card);
      color: var(--fg-muted);
      padding: 1px 7px;
      border-radius: 10px;
      font-weight: 600;
    }

    .folder-item {
      margin: 2px 8px;
      border-radius: 8px;
      overflow: hidden;
    }

    .folder-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      cursor: pointer;
      transition: all 0.2s;
      border-radius: 8px;
      user-select: none;
    }

    .folder-header:hover {
      background: var(--bg-hover);
    }

    .folder-header.active {
      background: var(--accent-glow);
    }

    .folder-chevron {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: var(--fg-muted);
      transition: transform 0.25s ease;
      flex-shrink: 0;
    }

    .folder-chevron.open {
      transform: rotate(90deg);
    }

    .folder-icon {
      font-size: 14px;
      width: 18px;
      text-align: center;
      flex-shrink: 0;
    }

    .folder-name {
      font-size: 13.5px;
      font-weight: 500;
      color: var(--fg-dim);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.2s;
    }

    .folder-header:hover .folder-name,
    .folder-header.active .folder-name {
      color: var(--fg);
    }

    .folder-count {
      font-size: 11px;
      color: var(--fg-muted);
      background: var(--bg-card);
      padding: 1px 7px;
      border-radius: 10px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .folder-header .folder-menu-btn {
      opacity: 0;
      background: transparent;
      border: none;
      color: var(--fg-muted);
      cursor: pointer;
      font-size: 12px;
      padding: 2px 4px;
      border-radius: 4px;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .folder-header:hover .folder-menu-btn {
      opacity: 1;
    }

    .folder-menu-btn:hover {
      color: var(--fg);
      background: var(--bg-active);
    }

    .folder-notes {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .folder-notes.expanded {
      max-height: 1200px;
    }

    .note-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px 7px 46px;
      margin: 1px 8px 1px 0;
      border-radius: 7px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .note-item::before {
      content: '';
      position: absolute;
      left: 28px;
      top: 50%;
      transform: translateY(-50%);
      width: 12px;
      height: 1px;
      background: var(--border-light);
    }

    .note-item:hover {
      background: var(--bg-hover);
    }

    .note-item.active {
      background: var(--accent-glow);
    }

    .note-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .note-item.active .note-dot,
    .note-item:hover .note-dot {
      opacity: 1;
    }

    .note-title-text {
      font-size: 13px;
      color: var(--fg-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      transition: color 0.2s;
    }

    .note-item:hover .note-title-text {
      color: var(--fg);
    }

    .note-item.active .note-title-text {
      color: var(--accent);
      font-weight: 500;
    }

    .note-date {
      font-size: 10px;
      color: var(--fg-muted);
      flex-shrink: 0;
    }

    .new-note-btn {
      margin: 8px 12px 16px;
      padding: 11px 16px;
      background: linear-gradient(135deg, var(--accent), #e85d2a);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 13.5px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.25s;
      box-shadow: 0 4px 15px rgba(255, 107, 53, 0.25);
    }

    .new-note-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 22px rgba(255, 107, 53, 0.35);
      background: linear-gradient(135deg, var(--accent-hover), #ff7040);
    }

    .new-note-btn:active {
      transform: translateY(0);
    }

    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-main);
      min-width: 0;
      position: relative;
    }

    .main-topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--toolbar-bg);
      flex-shrink: 0;
    }

    .hamburger-btn {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      color: var(--fg-dim);
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .hamburger-btn:hover {
      background: var(--bg-hover);
      color: var(--fg);
      border-color: var(--accent);
    }

    .topbar-breadcrumb {
      font-size: 13px;
      color: var(--fg-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .topbar-breadcrumb .tb-folder {
      color: var(--fg-dim);
      font-weight: 500;
    }

    .topbar-breadcrumb .tb-sep {
      font-size: 9px;
    }

    .topbar-breadcrumb .tb-note {
      color: var(--fg);
      font-weight: 500;
    }

    .topbar-spacer {
      flex: 1;
    }

    .topbar-actions {
      display: flex;
      gap: 6px;
    }

    .topbar-actions button {
      background: transparent;
      border: 1px solid var(--border-light);
      color: var(--fg-dim);
      width: 34px;
      height: 34px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .topbar-actions button:hover {
      background: var(--bg-hover);
      color: var(--fg);
    }

    .toolbar {
      background: var(--toolbar-bg);
      border-bottom: 1px solid var(--border);
      padding: 8px 24px;
      display: flex;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
      min-height: 48px;
      flex-wrap: wrap;
    }

    .toolbar-btn {
      background: transparent;
      border: none;
      color: var(--fg-dim);
      width: 34px;
      height: 34px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .toolbar-btn:hover {
      background: var(--bg-hover);
      color: var(--fg);
    }

    .toolbar-btn.active {
      background: var(--accent-glow);
      color: var(--accent);
    }

    .toolbar-divider {
      width: 1px;
      height: 22px;
      background: var(--border-light);
      margin: 0 6px;
    }

    .toolbar-select {
      background: transparent;
      border: 1px solid transparent;
      color: var(--fg-dim);
      font-size: 12.5px;
      font-family: 'DM Sans', sans-serif;
      padding: 5px 8px;
      border-radius: 6px;
      cursor: pointer;
      outline: none;
      transition: all 0.15s;
      appearance: none;
      -webkit-appearance: none;
    }

    .toolbar-select:hover {
      background: var(--bg-hover);
      border-color: var(--border-light);
      color: var(--fg);
    }

    .toolbar-select option {
      background: var(--bg-card);
      color: var(--fg);
    }

    .toolbar-spacer {
      flex: 1;
    }

    .toolbar-color-btn {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border-light);
      cursor: pointer;
      transition: all 0.15s;
    }

    .toolbar-color-btn:hover {
      transform: scale(1.2);
      border-color: var(--fg-dim);
    }

    .toolbar-color-btn.active-color {
      border-color: #fff;
      box-shadow: 0 0 0 2px var(--bg-deep), 0 0 8px rgba(255, 255, 255, 0.15);
    }

    .note-header {
      padding: 20px 40px 0;
      flex-shrink: 0;
    }

    .note-title-input {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--fg);
      letter-spacing: -0.5px;
      padding: 0;
    }

    .note-title-input::placeholder {
      color: var(--fg-muted);
    }

    .note-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 8px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .note-meta-item {
      font-size: 12px;
      color: var(--fg-muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .note-meta-item i {
      font-size: 11px;
    }

    .editor-area {
      flex: 1;
      padding: 24px 40px 40px;
      overflow-y: auto;
      outline: none;
      font-size: 15px;
      line-height: 1.75;
      color: var(--fg);
      min-height: 200px;
    }

    .editor-area:empty::before {
      content: 'Start writing your note here...';
      color: var(--fg-muted);
      font-style: italic;
      pointer-events: none;
    }

    .editor-area h1 {
      font-size: 24px;
      font-weight: 700;
      margin: 16px 0 8px;
      font-family: 'Space Grotesk', sans-serif;
    }

    .editor-area h2 {
      font-size: 20px;
      font-weight: 600;
      margin: 14px 0 6px;
      font-family: 'Space Grotesk', sans-serif;
    }

    .editor-area h3 {
      font-size: 17px;
      font-weight: 600;
      margin: 12px 0 4px;
      font-family: 'Space Grotesk', sans-serif;
    }

    .editor-area ul,
    .editor-area ol {
      padding-left: 24px;
      margin: 8px 0;
    }

    .editor-area li {
      margin: 4px 0;
    }

    .editor-area blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 16px;
      margin: 12px 0;
      color: var(--fg-dim);
      font-style: italic;
    }

    .editor-area code {
      background: var(--bg-card);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
      color: #ff9f6b;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 40px;
    }

    .empty-icon {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: var(--bg-card);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: var(--fg-muted);
      border: 1px solid var(--border);
    }

    .empty-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--fg-dim);
    }

    .empty-desc {
      font-size: 14px;
      color: var(--fg-muted);
      text-align: center;
      max-width: 340px;
      line-height: 1.6;
    }

    .empty-shortcut {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      font-size: 13px;
      color: var(--fg-muted);
    }

    .empty-shortcut kbd {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 5px;
      padding: 3px 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      color: var(--fg-dim);
    }

    .context-menu {
      position: fixed;
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 10px;
      padding: 6px;
      min-width: 190px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
      z-index: 1000;
      display: none;
      animation: ctxIn 0.15s ease;
    }

    @keyframes ctxIn {
      from {
        opacity: 0;
        transform: scale(0.95) translateY(-4px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .ctx-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      color: var(--fg-dim);
      transition: all 0.12s;
    }

    .ctx-item:hover {
      background: var(--bg-hover);
      color: var(--fg);
    }

    .ctx-item.danger:hover {
      background: rgba(248, 113, 113, 0.1);
      color: var(--danger);
    }

    .ctx-item i {
      width: 16px;
      text-align: center;
      font-size: 12px;
    }

    .ctx-item .ctx-arrow {
      margin-left: auto;
      font-size: 10px;
      color: var(--fg-muted);
    }

    .ctx-divider {
      height: 1px;
      background: var(--border);
      margin: 4px 8px;
    }

    .color-submenu {
      position: fixed;
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 10px;
      padding: 10px 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
      z-index: 1001;
      display: none;
      animation: ctxIn 0.15s ease;
    }

    .color-submenu-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--fg-muted);
      margin-bottom: 8px;
      padding: 0 2px;
    }

    .color-submenu-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }

    .color-submenu-opt {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .color-submenu-opt:hover {
      transform: scale(1.2);
      border-color: rgba(255, 255, 255, 0.4);
    }

    .color-submenu-opt.current {
      border-color: #fff;
      box-shadow: 0 0 0 2px var(--bg-card), 0 0 12px rgba(255, 255, 255, 0.2);
    }

    .color-submenu-opt.current::after {
      content: '\f00c';
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
      font-size: 11px;
      color: #fff;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
    }

    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 13px;
      color: var(--fg);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      gap: 10px;
      animation: toastIn 0.3s ease, toastOut 0.3s ease 2.2s forwards;
      min-width: 220px;
    }

    .toast i {
      font-size: 15px;
    }

    .toast.success i {
      color: var(--success);
    }

    .toast.info i {
      color: var(--accent);
    }

    .toast.error i {
      color: var(--danger);
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateY(16px) scale(0.95);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes toastOut {
      from {
        opacity: 1;
        transform: translateY(0);
      }

      to {
        opacity: 0;
        transform: translateY(8px);
      }
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      z-index: 1500;
      display: none;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.2s ease;
    }

    .modal-overlay.show {
      display: flex;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 14px;
      padding: 28px;
      width: 400px;
      max-width: 90vw;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      animation: modalIn 0.25s ease;
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: scale(0.93) translateY(12px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .modal-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 18px;
      color: var(--fg);
    }

    .modal-input {
      width: 100%;
      background: var(--bg-deep);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--fg);
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 8px;
    }

    .modal-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .modal-input.error {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(248, 113, 113, 0.15);
    }

    .modal-input::placeholder {
      color: var(--fg-muted);
    }

    .modal-label {
      font-size: 12px;
      color: var(--fg-muted);
      margin-bottom: 6px;
      display: block;
    }

    .modal-colors {
      display: flex;
      gap: 8px;
      margin: 8px 0 20px;
      flex-wrap: wrap;
    }

    .modal-color-opt {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.15s;
    }

    .modal-color-opt:hover,
    .modal-color-opt.selected {
      border-color: #fff;
      transform: scale(1.15);
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.15);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .modal-btn {
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }

    .modal-btn.cancel {
      background: var(--bg-hover);
      color: var(--fg-dim);
    }

    .modal-btn.cancel:hover {
      background: var(--bg-active);
      color: var(--fg);
    }

    .modal-btn.primary {
      background: var(--accent);
      color: #fff;
    }

    .modal-btn.primary:hover {
      background: var(--accent-hover);
      box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
    }

    .status-bar {
      background: var(--toolbar-bg);
      border-top: 1px solid var(--border);
      padding: 6px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: var(--fg-muted);
      flex-shrink: 0;
    }

    .status-left,
    .status-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    .bg-glow {
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      filter: blur(150px);
      opacity: 0.03;
      pointer-events: none;
      z-index: 0;
    }

    .bg-glow-1 {
      background: var(--accent);
      top: -200px;
      right: -100px;
    }

    .bg-glow-2 {
      background: #6366f1;
      bottom: -200px;
      left: 200px;
    }

    .note-item {
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-8px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<body>

  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeSidebar()"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon"><i class="fas fa-feather-alt"></i></div>
        <span class="logo-text">NoteCraft</span>
      </div>
      <div class="sidebar-actions">
        <button title="New Folder" onclick="openNewFolderModal()" aria-label="New folder"><i
            class="fas fa-folder-plus"></i></button>
        <button title="Close sidebar" onclick="closeSidebar()" aria-label="Close sidebar"><i
            class="fas fa-times"></i></button>
      </div>
    </div>
    <div class="search-bar">
      <div class="search-input-wrap">
        <i class="fas fa-search"></i>
        <input type="text" placeholder="Search notes..." id="searchInput" oninput="filterNotes(this.value)"
          aria-label="Search notes">
      </div>
    </div>
    <div class="folder-tree" id="folderTree">
      <div class="tree-section-label">Folders</div>
      <div class="all-notes-item" id="allNotesItem" onclick="showAllNotes()">
        <i class="fas fa-layer-group"></i>
        <span>All Notes</span>
        <span class="count-badge" id="allNotesCount">0</span>
      </div>
      <div id="foldersContainer"></div>
    </div>
    <button class="new-note-btn" onclick="createNewNote()">
      <i class="fas fa-plus"></i>
      New Note
    </button>
  </aside>

  <main class="main-area" id="mainArea">
    <div class="main-topbar">
      <button class="hamburger-btn" onclick="openSidebar()" aria-label="Open sidebar"><i
          class="fas fa-bars"></i></button>
      <div class="topbar-breadcrumb" id="topbarBreadcrumb">
        <span class="tb-folder" style="color:var(--fg-muted)">NoteCraft</span>
      </div>
      <div class="topbar-spacer"></div>
      <div class="topbar-actions">
        <button title="New Note" onclick="createNewNote()" aria-label="New note"><i class="fas fa-plus"></i></button>
      </div>
    </div>

    <div class="empty-state" id="emptyState">
      <div class="empty-icon"><i class="far fa-sticky-note"></i></div>
      <div class="empty-title" id="emptyTitle">No note selected</div>
      <div class="empty-desc" id="emptyDesc">Select a note from the sidebar to start editing, or create a new one.</div>
      <div class="empty-shortcut">
        <kbd>Ctrl</kbd> + <kbd>N</kbd>
        <span>New note</span>
      </div>
    </div>

    <div id="editorView" style="display:none; flex-direction:column; flex:1; min-height:0;">
      <div class="toolbar">
        <select class="toolbar-select" onchange="formatBlock(this.value); this.value='';" aria-label="Text format">
          <option value="">Format</option>
          <option value="p">Paragraph</option>
          <option value="h1">Heading 1</option>
          <option value="h2">Heading 2</option>
          <option value="h3">Heading 3</option>
          <option value="blockquote">Quote</option>
        </select>
        <div class="toolbar-divider"></div>
        <button class="toolbar-btn" onmousedown="event.preventDefault()" onclick="execCmd('bold')" title="Bold"><i
            class="fas fa-bold"></i></button>
        <button class="toolbar-btn" onmousedown="event.preventDefault()" onclick="execCmd('italic')" title="Italic"><i
            class="fas fa-italic"></i></button>
        <button class="toolbar-btn" onmousedown="event.preventDefault()" onclick="execCmd('underline')"
          title="Underline"><i class="fas fa-underline"></i></button>
        <button class="toolbar-btn" onmousedown="event.preventDefault()" onclick="execCmd('strikeThrough')"
          title="Strikethrough"><i class="fas fa-strikethrough"></i></button>
        <div class="toolbar-divider"></div>
        <button class="toolbar-btn" onmousedown="event.preventDefault()" onclick="execCmd('insertUnorderedList')"
          title="Bullet list"><i class="fas fa-list-ul"></i></button>
        <button class="toolbar-btn" onmousedown="event.preventDefault()" onclick="execCmd('insertOrderedList')"
          title="Numbered list"><i class="fas fa-list-ol"></i></button>
        <div class="toolbar-divider"></div>
        <button class="toolbar-btn" onmousedown="event.preventDefault()" onclick="execCmd('justifyLeft')"
          title="Align left"><i class="fas fa-align-left"></i></button>
        <button class="toolbar-btn" onmousedown="event.preventDefault()" onclick="execCmd('justifyCenter')"
          title="Align center"><i class="fas fa-align-center"></i></button>
        <button class="toolbar-btn" onmousedown="event.preventDefault()" onclick="execCmd('justifyRight')"
          title="Align right"><i class="fas fa-align-right"></i></button>
        <div class="toolbar-divider"></div>
        <button class="toolbar-btn" onmousedown="event.preventDefault()" onclick="insertCode()" title="Code"><i
            class="fas fa-code"></i></button>
        <div class="toolbar-spacer"></div>
        <div class="toolbar-color-btn" style="background:#ff6b35;" title="Orange" onmousedown="event.preventDefault()"
          onclick="applyColor('#ff6b35', this)"></div>
        <div class="toolbar-color-btn" style="background:#4ade80;" title="Green" onmousedown="event.preventDefault()"
          onclick="applyColor('#4ade80', this)"></div>
        <div class="toolbar-color-btn" style="background:#60a5fa;" title="Blue" onmousedown="event.preventDefault()"
          onclick="applyColor('#60a5fa', this)"></div>
        <div class="toolbar-color-btn" style="background:#e8e8f0;" title="White" onmousedown="event.preventDefault()"
          onclick="applyColor('#e8e8f0', this)"></div>
      </div>
      <div class="note-header">
        <input type="text" class="note-title-input" id="noteTitleInput" placeholder="Untitled"
          oninput="updateNoteTitle(this.value)" aria-label="Note title">
        <div class="note-meta">
          <div class="note-meta-item"><i class="far fa-clock"></i><span id="metaDate">--</span></div>
          <div class="note-meta-item"><i class="far fa-file-alt"></i><span id="metaWords">0 words</span></div>
          <div class="note-meta-item"><i class="far fa-file-lines"></i><span id="metaChars">0 characters</span></div>
        </div>
      </div>
      <div class="editor-area" id="editorArea" contenteditable="true" oninput="onEditorInput()" spellcheck="true"></div>
    </div>

    <div class="status-bar">
      <div class="status-left">
        <div style="display:flex;align-items:center;gap:6px;">
          <div class="status-dot"></div><span>Auto-saved</span>
        </div>
        <span id="statusFolder">--</span>
      </div>
      <div class="status-right">
        <span id="statusNotes">0 notes</span>
        <span>NoteCraft v1.0</span>
      </div>
    </div>
  </main>

  <div class="context-menu" id="contextMenu">
    <div class="ctx-item" data-action="rename"><i class="fas fa-pen"></i>Rename</div>
    <div class="ctx-item" data-action="addNote"><i class="fas fa-plus"></i>Add note here</div>
    <div class="ctx-divider"></div>
    <div class="ctx-item" id="ctxChangeColor" data-action="changeColor"><i class="fas fa-palette"></i>Change color<span
        class="ctx-arrow"><i class="fas fa-chevron-right"></i></span></div>
    <div class="ctx-item" data-action="duplicate"><i class="far fa-copy"></i>Duplicate</div>
    <div class="ctx-divider"></div>
    <div class="ctx-item danger" data-action="delete"><i class="far fa-trash-alt"></i>Delete</div>
  </div>

  <div class="color-submenu" id="colorSubmenu">
    <div class="color-submenu-title">Folder Color</div>
    <div class="color-submenu-grid" id="colorSubmenuGrid"></div>
  </div>

  <div class="modal-overlay" id="folderModal">
    <div class="modal">
      <div class="modal-title">New Folder</div>
      <input type="text" class="modal-input" id="newFolderName" placeholder="Folder name" maxlength="40"
        onkeydown="if(event.key==='Enter')confirmNewFolder()">
      <label class="modal-label">Folder color</label>
      <div class="modal-colors" id="folderColorPicker"></div>
      <div class="modal-actions">
        <button class="modal-btn cancel" onclick="closeFolderModal()">Cancel</button>
        <button class="modal-btn primary" onclick="confirmNewFolder()">Create</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="renameModal">
    <div class="modal">
      <div class="modal-title" id="renameModalTitle">Rename</div>
      <input type="text" class="modal-input" id="renameInput" placeholder="New name" maxlength="60"
        onkeydown="if(event.key==='Enter')confirmRename()">
      <div class="modal-actions">
        <button class="modal-btn cancel" onclick="closeRenameModal()">Cancel</button>
        <button class="modal-btn primary" onclick="confirmRename()">Save</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    var FOLDER_COLORS = ['#ff6b35', '#f59e0b', '#4ade80', '#60a5fa', '#a78bfa', '#f472b6', '#fb7185', '#38bdf8', '#34d399', '#fbbf24'];

    var DEFAULT_FOLDERS = [
      {
        id: 'f1', name: 'Personal', color: '#ff6b35', expanded: true, notes: [
          { id: 'n1', title: 'Daily Routine', content: '<h2>Morning Routine</h2><ul><li>Wake up at 6:00 AM</li><li>Meditation for 15 minutes</li><li>Exercise for 30 minutes</li><li>Healthy breakfast</li></ul><h2>Evening Routine</h2><ul><li>Review the day</li><li>Read for 30 minutes</li><li>Plan tomorrow</li><li>Sleep by 10:30 PM</li></ul>', date: '2026-07-14T10:30:00' },
          { id: 'n2', title: 'Books to Read', content: '<p>My reading list for this year:</p><ol><li><strong>Atomic Habits</strong> by James Clear</li><li><strong>Deep Work</strong> by Cal Newport</li><li><strong>The Almanack of Naval Ravikant</strong></li><li><strong>Thinking, Fast and Slow</strong> by Daniel Kahneman</li></ol><blockquote>Reading is to the mind what exercise is to the body.</blockquote>', date: '2026-07-13T15:20:00' },
          { id: 'n3', title: 'Fitness Goals', content: '<p>Target: Get in the best shape of my life by December 2026.</p><h3>Weekly Schedule</h3><ul><li>Monday: Chest & Triceps</li><li>Tuesday: Back & Biceps</li><li>Wednesday: Rest / Cardio</li><li>Thursday: Shoulders & Arms</li><li>Friday: Legs</li><li>Saturday: Full body HIIT</li><li>Sunday: Rest</li></ul>', date: '2026-07-12T09:00:00' }
        ]
      },
      {
        id: 'f2', name: 'Work', color: '#60a5fa', expanded: false, notes: [
          { id: 'n4', title: 'Project Roadmap Q3', content: '<h2>Q3 2026 Roadmap</h2><p>Key objectives:</p><ul><li>Launch v2.0</li><li>Migrate infrastructure</li><li>Hire 3 engineers</li><li>99.9% uptime</li></ul>', date: '2026-07-14T08:00:00' },
          { id: 'n5', title: 'Meeting Notes - July 10', content: '<p><strong>Attendees:</strong> Team Lead, PM, Design Lead</p><ul><li>Sprint progress on track</li><li>Design system updates needed</li></ul>', date: '2026-07-10T14:00:00' },
          { id: 'n6', title: 'API Documentation', content: '<code>POST /api/v2/auth/login</code><br><code>GET /api/v2/users</code><br><code>PUT /api/v2/users/:id</code>', date: '2026-07-09T11:30:00' }
        ]
      },
      {
        id: 'f3', name: 'Ideas', color: '#a78bfa', expanded: false, notes: [
          { id: 'n7', title: 'App Concept: FocusFlow', content: '<h2>FocusFlow</h2><p>A Pomodoro timer with ambient sounds and task tracking.</p><ul><li>Customizable intervals</li><li>Sound mixer</li><li>Daily stats</li></ul>', date: '2026-07-11T20:00:00' },
          { id: 'n8', title: 'Blog Post Ideas', content: '<ol><li>Why Dark Mode Matters</li><li>Building a Note App</li><li>Single-Page Applications</li><li>Color Theory for Dev Tools</li></ol>', date: '2026-07-08T16:45:00' }
        ]
      },
      {
        id: 'f4', name: 'Learning', color: '#4ade80', expanded: false, notes: [
          { id: 'n9', title: 'Rust Notes - Ownership', content: '<h2>Ownership Rules</h2><ol><li>Each value has one <strong>owner</strong></li><li>Value is <strong>dropped</strong> when owner goes out of scope</li><li>Values can be <strong>borrowed</strong> with &amp;</li></ol>', date: '2026-07-07T13:00:00' },
          { id: 'n10', title: 'WebGL Shader Basics', content: '<p>Shaders run on the GPU.</p><ul><li><strong>Vertex Shader</strong> — per vertex</li><li><strong>Fragment Shader</strong> — per pixel</li></ul>', date: '2026-07-06T10:15:00' }
        ]
      }
    ];

    var folders = [];
    var activeNoteId = null;
    var activeFolderId = null;
    var lastOpenedFolderId = 'f1';
    var contextTarget = null;
    var selectedFolderColor = FOLDER_COLORS[0];
    var renameTarget = null;
    var sidebarOpen = false;
    var colorSubmenuTimer = null;

    /* ===== LOCAL STORAGE ===== */
    var STORAGE_KEY = 'notecraft_data';

    function saveData() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          folders: folders,
          activeNoteId: activeNoteId,
          activeFolderId: activeFolderId,
          lastOpenedFolderId: lastOpenedFolderId
        }));
      } catch (e) {}
    }

    function loadData() {
      try {
        var saved = localStorage.getItem(STORAGE_KEY);
        if (!saved) return false;
        var data = JSON.parse(saved);
        if (!data || !Array.isArray(data.folders)) return false;
        for (var i = 0; i < data.folders.length; i++) {
          var f = data.folders[i];
          if (!f.id || !f.name || !Array.isArray(f.notes)) return false;
        }
        folders = data.folders;
        activeNoteId = data.activeNoteId || null;
        activeFolderId = data.activeFolderId || null;
        lastOpenedFolderId = data.lastOpenedFolderId || (folders.length > 0 ? folders[0].id : 'f1');
        return true;
      } catch (e) {
        try { localStorage.removeItem(STORAGE_KEY); } catch (e2) {}
        return false;
      }
    }

    if (!loadData()) {
      folders = JSON.parse(JSON.stringify(DEFAULT_FOLDERS));
    }
    /* ========================= */

    function genId() { return 'id_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7); }

    function formatDate(dateStr) {
      var d = new Date(dateStr), now = new Date(), diff = now - d;
      if (diff < 60000) return 'Just now';
      if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
      if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
      if (diff < 604800000) return Math.floor(diff / 86400000) + 'd ago';
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function formatFullDate(dateStr) {
      return new Date(dateStr).toLocaleString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function getTotalNoteCount() { return folders.reduce(function (s, f) { return s + f.notes.length; }, 0); }

    function findNote(noteId) {
      for (var i = 0; i < folders.length; i++) {
        var notes = folders[i].notes;
        for (var j = 0; j < notes.length; j++) {
          if (notes[j].id === noteId) return { note: notes[j], folder: folders[i] };
        }
      }
      return null;
    }

    function escHtml(str) { var d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

    function openSidebar() { sidebarOpen = true; document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebarBackdrop').classList.add('visible'); }
    function closeSidebar() { sidebarOpen = false; document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarBackdrop').classList.remove('visible'); }

    function updateTopbarBreadcrumb() {
      var bc = document.getElementById('topbarBreadcrumb');
      if (activeNoteId) {
        var found = findNote(activeNoteId);
        if (found) {
          bc.innerHTML = '<span class="tb-folder" style="color:' + found.folder.color + '">' + escHtml(found.folder.name) + '</span><i class="fas fa-chevron-right tb-sep"></i><span class="tb-note">' + escHtml(found.note.title || 'Untitled') + '</span>';
          return;
        }
      }
      if (activeFolderId && !activeNoteId) {
        var folder = folders.find(function (f) { return f.id === activeFolderId; });
        if (folder) {
          bc.innerHTML = '<span class="tb-folder" style="color:' + folder.color + '">' + escHtml(folder.name) + '</span>';
          return;
        }
      }
      bc.innerHTML = '<span class="tb-folder" style="color:var(--fg-muted)">NoteCraft</span>';
    }

    function render() {
      renderFolders();
      document.getElementById('allNotesCount').textContent = getTotalNoteCount();
      document.getElementById('statusNotes').textContent = getTotalNoteCount() + ' notes';
      document.getElementById('allNotesItem').classList.toggle('active', activeNoteId === null && activeFolderId === null);
      updateTopbarBreadcrumb();
      if (activeNoteId) updateMeta();
    }

    function renderFolders() {
      var container = document.getElementById('foldersContainer');
      var query = document.getElementById('searchInput').value.toLowerCase().trim();
      container.innerHTML = '';

      for (var fi = 0; fi < folders.length; fi++) {
        var folder = folders[fi];
        var filteredNotes = folder.notes;
        if (query) {
          filteredNotes = folder.notes.filter(function (n) {
            return n.title.toLowerCase().indexOf(query) !== -1 || n.content.replace(/<[^>]*>/g, '').toLowerCase().indexOf(query) !== -1;
          });
          if (filteredNotes.length === 0 && folder.name.toLowerCase().indexOf(query) === -1) continue;
        }
        var isExpanded = folder.expanded || (query && filteredNotes.length > 0);
        var isActive = activeFolderId === folder.id && !activeNoteId;

        var div = document.createElement('div');
        div.className = 'folder-item';

        var notesHtml = '';
        for (var ni = 0; ni < filteredNotes.length; ni++) {
          var n = filteredNotes[ni];
          var noteActive = activeNoteId === n.id ? ' active' : '';
          notesHtml += '<div class="note-item' + noteActive + '" onclick="selectNote(\'' + folder.id + '\', \'' + n.id + '\')" oncontextmenu="showNoteContext(event, \'' + folder.id + '\', \'' + n.id + '\')">'
            + '<span class="note-dot" style="background:' + folder.color + '"></span>'
            + '<span class="note-title-text">' + escHtml(n.title || 'Untitled') + '</span>'
            + '<span class="note-date">' + formatDate(n.date) + '</span>'
            + '</div>';
        }

        div.innerHTML = '<div class="folder-header ' + (isActive ? 'active' : '') + '" data-folder-id="' + folder.id + '" onclick="selectFolder(\'' + folder.id + '\')" oncontextmenu="showFolderContext(event, \'' + folder.id + '\')">'
          + '<span class="folder-chevron ' + (isExpanded ? 'open' : '') + '"><i class="fas fa-chevron-right"></i></span>'
          + '<span class="folder-icon" style="color:' + folder.color + '"><i class="fas fa-folder' + (isExpanded ? '-open' : '') + '"></i></span>'
          + '<span class="folder-name">' + escHtml(folder.name) + '</span>'
          + '<span class="folder-count">' + filteredNotes.length + '</span>'
          + '<button class="folder-menu-btn" onclick="event.stopPropagation(); showFolderContext(event, \'' + folder.id + '\')" aria-label="Folder menu"><i class="fas fa-ellipsis-h"></i></button>'
          + '</div>'
          + '<div class="folder-notes ' + (isExpanded ? 'expanded' : '') + '">'
          + notesHtml
          + '</div>';

        container.appendChild(div);
      }
    }

    function selectFolder(folderId) {
      var folder = folders.find(function (f) { return f.id === folderId; });
      if (!folder) return;
      folder.expanded = !folder.expanded;
      activeFolderId = folderId;
      activeNoteId = null;
      lastOpenedFolderId = folderId;
      showEmptyState('No note selected', 'Select a note from "' + folder.name + '" to start editing.');
      document.getElementById('statusFolder').textContent = folder.name;
      render();
      saveData();
    }

    function selectNote(folderId, noteId) {
      var folder = folders.find(function (f) { return f.id === folderId; });
      if (folder) folder.expanded = true;
      activeNoteId = noteId;
      activeFolderId = folderId;
      lastOpenedFolderId = folderId;
      showEditor();
      render();
      closeSidebar();
      saveData();
    }

    function showAllNotes() {
      activeNoteId = null;
      activeFolderId = null;
      showEmptyState('All Notes', 'Showing all notes across folders. Select a note to edit.');
      document.getElementById('statusFolder').textContent = '--';
      render();
      closeSidebar();
      saveData();
    }

    function showEditor() {
      var found = findNote(activeNoteId);
      if (!found) { showEmptyState('No note selected', 'Select a note from the sidebar.'); return; }
      var note = found.note;
      var folder = found.folder;
      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('editorView').style.display = 'flex';
      document.getElementById('noteTitleInput').value = note.title || '';
      document.getElementById('editorArea').innerHTML = note.content || '';
      document.getElementById('statusFolder').textContent = folder.name;
      document.querySelectorAll('.toolbar-color-btn').forEach(function (b) { b.classList.remove('active-color'); });
      updateMeta();
    }

    function showEmptyState(title, desc) {
      document.getElementById('emptyState').style.display = 'flex';
      document.getElementById('editorView').style.display = 'none';
      document.getElementById('emptyTitle').textContent = title;
      document.getElementById('emptyDesc').textContent = desc;
    }

    function updateNoteTitle(val) {
      var f = findNote(activeNoteId);
      if (f) { f.note.title = val; render(); saveData(); }
    }

    var _editorSaveTimer = null;
    function onEditorInput() {
      var found = findNote(activeNoteId);
      if (!found) return;
      found.note.content = document.getElementById('editorArea').innerHTML;
      found.note.date = new Date().toISOString();
      updateMeta();
      document.getElementById('allNotesCount').textContent = getTotalNoteCount();
      updateTopbarBreadcrumb();
      clearTimeout(_editorSaveTimer);
      _editorSaveTimer = setTimeout(function () { saveData(); }, 300);
    }

    function updateMeta() {
      var found = findNote(activeNoteId);
      if (!found) return;
      var text = document.getElementById('editorArea').innerText || '';
      var words = text.trim() ? text.trim().split(/\s+/).length : 0;
      document.getElementById('metaDate').textContent = formatFullDate(found.note.date);
      document.getElementById('metaWords').textContent = words + ' words';
      document.getElementById('metaChars').textContent = text.length + ' characters';
    }

    function execCmd(cmd, val) { document.execCommand(cmd, false, val || null); }

    function formatBlock(tag) {
      if (tag) document.execCommand('formatBlock', false, '<' + tag + '>');
    }

    function applyColor(color, btn) {
      document.execCommand('foreColor', false, color);
      document.querySelectorAll('.toolbar-color-btn').forEach(function (b) { b.classList.remove('active-color'); });
      btn.classList.add('active-color');
    }

    function insertCode() {
      var sel = window.getSelection();
      if (sel.rangeCount) {
        var range = sel.getRangeAt(0);
        var code = document.createElement('code');
        range.surroundContents(code);
      }
    }

    function createNewNote() {
      var targetFolderId = activeFolderId || lastOpenedFolderId || (folders.length > 0 ? folders[0].id : null);
      if (!targetFolderId) { showToast('Create a folder first', 'info'); return; }
      var folder = folders.find(function (f) { return f.id === targetFolderId; });
      if (!folder) return;
      var note = { id: genId(), title: '', content: '', date: new Date().toISOString() };
      folder.notes.unshift(note);
      folder.expanded = true;
      activeNoteId = note.id;
      activeFolderId = folder.id;
      lastOpenedFolderId = folder.id;
      showEditor();
      render();
      document.getElementById('noteTitleInput').focus();
      saveData();
    }

    function filterNotes(query) { render(); }

    function openNewFolderModal() {
      selectedFolderColor = FOLDER_COLORS[0];
      document.getElementById('newFolderName').value = '';
      document.getElementById('newFolderName').classList.remove('error');
      renderFolderColorPicker();
      document.getElementById('folderModal').classList.add('show');
      setTimeout(function () { document.getElementById('newFolderName').focus(); }, 100);
    }

    function closeFolderModal() { document.getElementById('folderModal').classList.remove('show'); }

    function renderFolderColorPicker() {
      var html = '';
      for (var i = 0; i < FOLDER_COLORS.length; i++) {
        var c = FOLDER_COLORS[i];
        html += '<div class="modal-color-opt ' + (c === selectedFolderColor ? 'selected' : '') + '" style="background:' + c + '" onclick="selectFolderColor(\'' + c + '\')"></div>';
      }
      document.getElementById('folderColorPicker').innerHTML = html;
    }

    function selectFolderColor(c) { selectedFolderColor = c; renderFolderColorPicker(); }

    function confirmNewFolder() {
      var name = document.getElementById('newFolderName').value.trim();
      if (!name) { document.getElementById('newFolderName').classList.add('error'); return; }
      folders.push({ id: genId(), name: name, color: selectedFolderColor, expanded: false, notes: [] });
      closeFolderModal();
      render();
      showToast('Folder created', 'success');
      saveData();
    }

    function showFolderContext(e, folderId) {
      e.preventDefault();
      e.stopPropagation();
      contextTarget = { type: 'folder', id: folderId };
      showContextMenu(e.clientX, e.clientY);
    }

    function showNoteContext(e, folderId, noteId) {
      e.preventDefault();
      e.stopPropagation();
      contextTarget = { type: 'note', folderId: folderId, id: noteId };
      showContextMenu(e.clientX, e.clientY);
    }

    function showContextMenu(x, y) {
      var menu = document.getElementById('contextMenu');
      menu.style.display = 'block';
      var rect = menu.getBoundingClientRect();
      if (x + rect.width > window.innerWidth) x = window.innerWidth - rect.width - 8;
      if (y + rect.height > window.innerHeight) y = window.innerHeight - rect.height - 8;
      menu.style.left = x + 'px';
      menu.style.top = y + 'px';
    }

    function hideContextMenu() {
      document.getElementById('contextMenu').style.display = 'none';
      document.getElementById('colorSubmenu').style.display = 'none';
    }

    document.getElementById('contextMenu').addEventListener('click', function (e) {
      var item = e.target.closest('.ctx-item');
      if (!item || !contextTarget) return;
      var action = item.dataset.action;
      if (action === 'rename') {
        openRenameModal();
        hideContextMenu();
      } else if (action === 'addNote') {
        addNoteToContextFolder();
        hideContextMenu();
      } else if (action === 'changeColor') {
        showColorSubmenu();
      } else if (action === 'duplicate') {
        duplicateContextTarget();
        hideContextMenu();
      } else if (action === 'delete') {
        deleteContextTarget();
        hideContextMenu();
      }
    });

    function showColorSubmenu() {
      var grid = document.getElementById('colorSubmenuGrid');
      var folder = folders.find(function (f) { return f.id === contextTarget.id; });
      var html = '';
      for (var i = 0; i < FOLDER_COLORS.length; i++) {
        var c = FOLDER_COLORS[i];
        var isCurrent = folder && folder.color === c ? ' current' : '';
        html += '<div class="color-submenu-opt' + isCurrent + '" style="background:' + c + '" onclick="changeFolderColor(\'' + c + '\')"></div>';
      }
      grid.innerHTML = html;
      var menu = document.getElementById('contextMenu');
      var rect = menu.getBoundingClientRect();
      var sub = document.getElementById('colorSubmenu');
      sub.style.display = 'block';
      sub.style.left = (rect.right + 4) + 'px';
      sub.style.top = rect.top + 'px';
      var subRect = sub.getBoundingClientRect();
      if (subRect.right > window.innerWidth) sub.style.left = (rect.left - subRect.width - 4) + 'px';
      if (subRect.bottom > window.innerHeight) sub.style.top = (window.innerHeight - subRect.height - 8) + 'px';
    }

    function changeFolderColor(color) {
      var folder = folders.find(function (f) { return f.id === contextTarget.id; });
      if (folder) { folder.color = color; render(); saveData(); }
      hideContextMenu();
    }

    function addNoteToContextFolder() {
      var folder = folders.find(function (f) { return f.id === contextTarget.id; });
      if (!folder) return;
      var note = { id: genId(), title: '', content: '', date: new Date().toISOString() };
      folder.notes.unshift(note);
      folder.expanded = true;
      activeNoteId = note.id;
      activeFolderId = folder.id;
      lastOpenedFolderId = folder.id;
      showEditor();
      render();
      document.getElementById('noteTitleInput').focus();
      saveData();
    }

    function duplicateContextTarget() {
      if (contextTarget.type === 'folder') {
        var folder = folders.find(function (f) { return f.id === contextTarget.id; });
        if (!folder) return;
        var newNotes = [];
        for (var i = 0; i < folder.notes.length; i++) {
          newNotes.push({ id: genId(), title: folder.notes[i].title, content: folder.notes[i].content, date: folder.notes[i].date });
        }
        folders.push({ id: genId(), name: folder.name + ' (copy)', color: folder.color, expanded: false, notes: newNotes });
        render();
        showToast('Folder duplicated', 'success');
        saveData();
      } else if (contextTarget.type === 'note') {
        var f = folders.find(function (f) { return f.id === contextTarget.folderId; });
        if (!f) return;
        var note = f.notes.find(function (n) { return n.id === contextTarget.id; });
        if (!note) return;
        var idx = f.notes.indexOf(note);
        var newNote = { id: genId(), title: note.title + ' (copy)', content: note.content, date: new Date().toISOString() };
        f.notes.splice(idx + 1, 0, newNote);
        activeNoteId = newNote.id;
        showEditor();
        render();
        showToast('Note duplicated', 'success');
        saveData();
      }
    }

    function deleteContextTarget() {
      if (contextTarget.type === 'folder') {
        var idx = -1;
        for (var i = 0; i < folders.length; i++) {
          if (folders[i].id === contextTarget.id) { idx = i; break; }
        }
        if (idx === -1) return;
        var name = folders[idx].name;
        folders.splice(idx, 1);
        if (activeFolderId === contextTarget.id) {
          activeFolderId = null;
          activeNoteId = null;
          showEmptyState('No note selected', 'Select a note from the sidebar.');
        }
        if (activeNoteId) {
          var found = findNote(activeNoteId);
          if (!found) {
            activeNoteId = null;
            showEmptyState('No note selected', 'Select a note from the sidebar.');
          }
        }
        render();
        showToast('"' + name + '" deleted', 'error');
        saveData();
      } else if (contextTarget.type === 'note') {
        var f = folders.find(function (f) { return f.id === contextTarget.folderId; });
        if (!f) return;
        var ni = -1;
        for (var j = 0; j < f.notes.length; j++) {
          if (f.notes[j].id === contextTarget.id) { ni = j; break; }
        }
        if (ni === -1) return;
        var title = f.notes[ni].title || 'Untitled';
        f.notes.splice(ni, 1);
        if (activeNoteId === contextTarget.id) {
          activeNoteId = null;
          showEmptyState('No note selected', 'Select a note from the sidebar.');
        }
        render();
        showToast('"' + title + '" deleted', 'error');
        saveData();
      }
    }

    function openRenameModal() {
      if (!contextTarget) return;
      var name = '';
      if (contextTarget.type === 'folder') {
        var folder = folders.find(function (f) { return f.id === contextTarget.id; });
        if (folder) name = folder.name;
        document.getElementById('renameModalTitle').textContent = 'Rename Folder';
      } else {
        var found = findNote(contextTarget.id);
        if (found) name = found.note.title;
        document.getElementById('renameModalTitle').textContent = 'Rename Note';
      }
      renameTarget = { type: contextTarget.type, id: contextTarget.id, folderId: contextTarget.folderId };
      document.getElementById('renameInput').value = name;
      document.getElementById('renameInput').classList.remove('error');
      document.getElementById('renameModal').classList.add('show');
      setTimeout(function () {
        var inp = document.getElementById('renameInput');
        inp.focus();
        inp.select();
      }, 100);
    }

    function closeRenameModal() { document.getElementById('renameModal').classList.remove('show'); renameTarget = null; }

    function confirmRename() {
      if (!renameTarget) return;
      var val = document.getElementById('renameInput').value.trim();
      if (!val) { document.getElementById('renameInput').classList.add('error'); return; }
      if (renameTarget.type === 'folder') {
        var folder = folders.find(function (f) { return f.id === renameTarget.id; });
        if (folder) folder.name = val;
      } else {
        var found = findNote(renameTarget.id);
        if (found) {
          found.note.title = val;
          if (activeNoteId === renameTarget.id) document.getElementById('noteTitleInput').value = val;
        }
      }
      closeRenameModal();
      render();
      showToast('Renamed', 'success');
      saveData();
    }

    function showToast(msg, type) {
      type = type || 'info';
      var container = document.getElementById('toastContainer');
      var icons = { success: 'fa-check-circle', info: 'fa-info-circle', error: 'fa-exclamation-circle' };
      var toast = document.createElement('div');
      toast.className = 'toast ' + type;
      toast.innerHTML = '<i class="fas ' + (icons[type] || icons.info) + '"></i><span>' + msg + '</span>';
      container.appendChild(toast);
      setTimeout(function () { if (toast.parentNode) toast.remove(); }, 2600);
    }

    document.addEventListener('click', function (e) {
      if (!e.target.closest('.context-menu') && !e.target.closest('.color-submenu') && !e.target.closest('.folder-menu-btn')) {
        hideContextMenu();
      }
    });

    document.addEventListener('keydown', function (e) {
      if (e.ctrlKey && e.key === 'n') { e.preventDefault(); createNewNote(); }
      if (e.key === 'Escape') { closeSidebar(); closeFolderModal(); closeRenameModal(); hideContextMenu(); }
    });

    // ===== Initial render =====
    if (activeNoteId) {
      var found = findNote(activeNoteId);
      if (found) {
        showEditor();
      } else {
        activeNoteId = null;
        if (activeFolderId) {
          var folder = folders.find(function (f) { return f.id === activeFolderId; });
          if (folder) {
            showEmptyState('No note selected', 'Select a note from "' + folder.name + '" to start editing.');
            document.getElementById('statusFolder').textContent = folder.name;
          } else {
            activeFolderId = null;
            showEmptyState('No note selected', 'Select a note from the sidebar to start editing, or create a new one.');
          }
        } else {
          showEmptyState('No note selected', 'Select a note from the sidebar to start editing, or create a new one.');
        }
      }
    }
    render();
  </script>
</body>

</html>
